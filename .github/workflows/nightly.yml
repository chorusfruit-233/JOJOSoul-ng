name: Nightly Build

on:
  schedule:
    # 每天 UTC 02:00 (北京时间 10:00) 运行
    - cron: '0 2 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  nightly-build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            os_name: linux
            binary_name: JOJOSoul
            binary_extension: ""
          - os: windows-latest
            os_name: windows
            binary_name: JOJOSoul
            binary_extension: ".exe"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: |
        python -m pytest tests/ -v

    - name: Check code quality
      run: |
        flake8 JOJOSoul-ng.py tests/ --extend-ignore=E402
        black --check .

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --name "${{ matrix.binary_name }}" JOJOSoul-ng.py

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: JOJOSoul-${{ matrix.os_name }}-nightly
        path: |
          dist/${{ matrix.binary_name }}${{ matrix.binary_extension }}
          README.md
        retention-days: 7

  update-dev-info:
    runs-on: ubuntu-latest
    needs: nightly-build
    steps:
    - uses: actions/checkout@v4
    
    - name: Update build info
      run: |
        echo "## 🚀 夜间构建状态" > BUILD_STATUS.md
        echo "" >> BUILD_STATUS.md
        echo "**最后构建时间**: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> BUILD_STATUS.md
        echo "**构建状态**: ✅ 成功" >> BUILD_STATUS.md
        echo "**提交**: ${{ github.sha }}" >> BUILD_STATUS.md
        echo "" >> BUILD_STATUS.md
        echo "### 下载最新构建" >> BUILD_STATUS.md
        echo "请访问 [Actions 页面](https://github.com/${{ github.repository }}/actions) 下载最新的构建产物。" >> BUILD_STATUS.md
        
    - name: Commit and push build status
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add BUILD_STATUS.md
        git diff --staged --quiet || git commit -m "chore: 更新夜间构建状态 [skip ci]"
        git push