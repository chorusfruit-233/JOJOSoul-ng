<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOJO Soul - Web 版</title>
    <link rel="stylesheet" href="style.css">
    <!-- 注册 COI Service Worker 以启用 SharedArrayBuffer -->
    <script src="coi-serviceworker.js"></script>
</head>
<body>
    <!-- 加载界面 -->
    <div id="loading">
        <div class="loading-card">
            <div class="spinner"></div>
            <p id="loading-text">正在加载游戏...</p>
            <p class="loading-hint">首次加载需要约 10-20 秒下载 Pyodide</p>
        </div>
    </div>

    <!-- 游戏主界面 -->
    <div id="game-container" style="display: none;">
        <header>
            <div class="header-left">
                <h1>JOJO Soul</h1>
                <span class="version">v2.3.0</span>
            </div>
            <div class="header-right">
                <button class="icon-btn" id="btn-clear" title="清屏">清屏</button>
                <button class="icon-btn" id="btn-restart" title="重新开始">重启</button>
            </div>
        </header>

        <main id="game-main">
            <div id="game-output"></div>
        </main>

        <footer>
            <p>JOJO Soul · 基于 Pyodide 的 Web 版 · WASM 运行 Python</p>
        </footer>
    </div>

    <!-- 现代模态对话框 -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-title">标题</h2>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- 动态内容 -->
            </div>
            <div id="modal-input-group" class="modal-input-group" style="display: none;">
                <input type="text" id="modal-input" autocomplete="off" />
            </div>
            <div class="modal-actions" id="modal-actions">
                <!-- 动态按钮 -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // 清屏按钮
        document.getElementById('btn-clear').addEventListener('click', () => {
            document.getElementById('game-output').innerHTML = '';
        });
        // 重启按钮
        document.getElementById('btn-restart').addEventListener('click', () => {
            if (confirm('确定要重新开始游戏吗？当前进度将丢失。')) {
                location.reload();
            }
        });
    </script>
</body>
</html>
